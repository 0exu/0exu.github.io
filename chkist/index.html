<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0warn - Pentest Checklist</title>
  <link rel="stylesheet" href="../home.css">
  <link rel="icon" sizes="70x70" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/OMSWASTRA_WITHOUT_BACKGORUND_2.png/250px-OMSWASTRA_WITHOUT_BACKGORUND_2.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* FLUID LAYOUT FIX */
    .content {
      max-width: none !important;
      width: 100% !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
    }
    header, footer {
      max-width: none !important;
      padding-left: 40px !important;
      padding-right: 40px !important;
    }
    #checklist-root {
      min-height: 100vh;
      background: var(--bg);
      padding: 0 20px;
      display: flex;
      flex-direction: column;
    }
    .checklist-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-height: 100vh;
      overflow: hidden;
    }

    /* CUSTOM MODAL */
    .custom-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 20000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
      animation: workspaceFadeIn 0.3s ease-out;
    }
    .custom-modal {
      background: var(--bg);
      border: 4px solid #000;
      border-radius: var(--radius);
      box-shadow: 12px 12px 0px #000;
      padding: 35px;
      width: 90%;
      max-width: 550px;
      position: relative;
    }
    .custom-modal-title {
      font-family: var(--font-mono);
      font-weight: 900;
      font-size: 1.3rem;
      text-transform: uppercase;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--primary);
    }
    .custom-modal-content {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      margin-bottom: 35px;
      line-height: 1.7;
      color: #333;
      background: var(--cream);
      padding: 20px;
      border: 2px dashed #000;
      border-radius: 8px;
    }
    .custom-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }
    .modal-btn {
      padding: 12px 30px;
      font-family: var(--font-mono);
      font-weight: 900;
      text-transform: uppercase;
      border: 3px solid #000;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.1s;
      box-shadow: 4px 4px 0px #000;
      letter-spacing: 1px;
    }
    .modal-btn-ok { background: var(--secondary); color: #000; }
    .modal-btn-cancel { background: #eee; color: #000; }
    .modal-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #000; }
    .modal-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }

    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); }
    }
    @keyframes dataFlow {
      0% { stroke-dashoffset: 14; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulsePurple {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(139, 92, 246, 0.3)); }
      50% { filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.5)); }
    }
    @keyframes commanderSlideOut {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-100%) scale(0.95); opacity: 0; }
    }
    @keyframes workspaceFadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes bellShake {
      0% { transform: rotate(0); }
      15% { transform: rotate(20deg); }
      30% { transform: rotate(-20deg); }
      45% { transform: rotate(15deg); }
      60% { transform: rotate(-15deg); }
      75% { transform: rotate(10deg); }
      85% { transform: rotate(-10deg); }
      100% { transform: rotate(0); }
    }
    .role-bell {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 28px;
      height: 28px;
      background: #ffda47;
      border: 3px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 14px;
      cursor: pointer;
      z-index: 20;
      box-shadow: 2px 2px 0px #000;
      animation: bellShake 1.5s infinite;
      transition: all 0.1s;
    }
    .role-bell:hover {
      transform: scale(1.1);
      background: var(--primary);
      color: #fff;
    }
    .role-bell:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px #000;
    }

    /* ===== ROLE SELECTOR ===== */
    .role-select-card {
      background: var(--white);
      border: var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 25px;
      margin: 0 auto;
      position: relative;
      overflow: visible;
      max-width: 1100px;
      width: 100%;
    }
    .role-select-card .section-title {
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .purple-team-center {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }
    .role-node-btn {
      border-radius: var(--radius);
      font-weight: 900;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      letter-spacing: 0.3px;
      position: relative;
      z-index: 2;
      user-select: none;
    }
    .role-node-btn:active {
      transform: translate(3px, 3px) !important;
      box-shadow: 0px 0px 0px 0px #000 !important;
    }
    .role-node-btn.purple-btn {
      background: #8b5cf6;
      color: #fff;
      border: 3px solid #000;
      padding: 14px 30px;
      font-size: 15px;
      animation: pulsePurple 2s ease-in-out infinite;
      box-shadow: 5px 5px 0px 0px #000;
    }
    .role-node-btn.purple-btn.active {
      box-shadow: 0px 0px 0px 0px #000;
      transform: translate(3px, 3px);
    }
    .role-node-btn.purple-btn i { font-size: 17px; }
    .role-node-btn.red-team-btn {
      background: #fef2f2;
      color: #dc2626;
      border: 3px solid #dc2626;
      padding: 12px 24px;
      font-size: 14px;
      box-shadow: 4px 4px 0px 0px #000;
    }
    .role-node-btn.red-team-btn.active {
      background: #dc2626;
      color: #fff;
      box-shadow: 0px 0px 0px 0px #000;
      transform: translate(3px, 3px);
    }
    .role-node-btn.red-team-btn i { font-size: 15px; }
    .role-node-btn.blue-team-btn {
      background: #eff6ff;
      color: #2563eb;
      border: 3px solid #2563eb;
      padding: 12px 24px;
      font-size: 14px;
      box-shadow: 4px 4px 0px 0px #000;
    }
    .role-node-btn.blue-team-btn.active {
      background: #2563eb;
      color: #fff;
      box-shadow: 0px 0px 0px 0px #000;
      transform: translate(3px, 3px);
    }
    .role-node-btn.blue-team-btn i { font-size: 15px; }
    .role-node-btn.sub-red {
      border: 3px solid #000;
      box-shadow: 4px 4px 0px 0px #000;
      font-size: 12px;
      padding: 11px 14px;
      background: var(--white);
      color: #000;
      width: 100%;
    }
    .role-node-btn.sub-red i { font-size: 14px; }
    .role-node-btn.sub-red.active {
      background: #dc2626;
      color: #fff;
      box-shadow: 0px 0px 0px 0px #000;
      transform: translate(3px, 3px);
    }
    .role-node-btn.sub-blue {
      border: 3px solid #000;
      box-shadow: 4px 4px 0px 0px #000;
      font-size: 12px;
      padding: 11px 14px;
      background: var(--white);
      color: #000;
      width: 100%;
    }
    .role-node-btn.sub-blue i { font-size: 14px; }
    .role-node-btn.sub-blue.active {
      background: #2563eb;
      color: #fff;
      box-shadow: 0px 0px 0px 0px #000;
      transform: translate(3px, 3px);
    }

    .init-mission-container {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      width: 100%;
      position: relative;
      z-index: 5;
    }
    .init-mission-btn {
      background: #000;
      color: #fff;
      border: 3px solid #000;
      padding: 10px 28px;
      font-family: var(--font-mono);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      box-shadow: 4px 4px 0px 0px var(--primary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .init-mission-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px 0px var(--primary);
    }
    .init-mission-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0px 0px 0px 0px #000;
    }

    .teams-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 12px;
      position: relative;
      z-index: 2;
    }
    .team-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .team-header-btn {
      margin-bottom: 6px;
    }
    .team-label {
      font-weight: 900;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      margin-bottom: 8px;
    }
    .team-label.red-label { color: #dc2626; }
    .team-label.blue-label { color: #2563eb; }
    .role-grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 400px;
    }
    .rack-spacer {
      display: none;
    }

    /* ===== ACTIVE MISSION CARD ===== */
    .active-mission-card {
      background: var(--white);
      border: 3px solid #000;
      border-radius: var(--radius);
      box-shadow: 5px 5px 0px 0px #000;
      margin-top: 24px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.1s;
      position: relative;
      z-index: 5;
    }
    .active-mission-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0px 0px #000;
    }
    .active-mission-card:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0px 0px #000;
    }
    .active-mission-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .active-mission-badge {
      background: #000;
      color: var(--primary);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 4px 10px;
      border-radius: 4px;
    }
    .active-mission-pct {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 900;
      color: var(--primary);
    }
    .active-mission-body {
      margin-bottom: 12px;
    }
    .active-mission-title {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 8px;
    }
    .active-mission-title i {
      margin-right: 8px;
      color: var(--primary);
    }
    .active-mission-progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .active-progress-bar {
      flex: 1;
      height: 12px;
      background: #e0e0e0;
      border-radius: 6px;
      border: 2px solid #000;
      overflow: hidden;
    }
    .active-progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 0 4px 4px 0;
      transition: width 0.5s ease;
    }
    .active-pct-text {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 900;
      color: #555;
      white-space: nowrap;
    }
    .active-mission-target {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #555;
      margin-top: 6px;
    }
    .active-mission-target i {
      margin-right: 5px;
      color: var(--primary);
    }
    .active-mission-resume {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: 3px solid #000;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px;
      cursor: pointer;
      box-shadow: 3px 3px 0px 0px #000;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .active-mission-resume:active {
      transform: translate(3px, 3px);
      box-shadow: 0px 0px 0px 0px #000;
    }
    .active-mission-resume i {
      font-size: 12px;
    }

    /* ===== OBJECTIVES BOX ===== */
    .objectives-box {
      background: var(--white);
      border: 3px solid #000;
      border-radius: var(--radius);
      box-shadow: 5px 5px 0px 0px #000;
      margin-top: 20px;
    }
    .objectives-box-header {
      background: #000;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .objectives-box-header i {
      color: var(--primary);
    }
    .objectives-box-body {
      padding: 20px;
      padding-bottom: 60px;
    }

    /* ===== COMMANDER OVERLAY ===== */
    .commander-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10000;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .commander-overlay.slide-out {
      animation: commanderSlideOut 0.6s ease-in forwards;
    }
    .commander-inner {
      width: 90%;
      max-width: 650px;
      padding: 45px;
      position: relative;
      background: var(--white);
      border: var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .commander-title {
      font-family: var(--font-mono);
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }
    .commander-subtitle {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 35px;
    }
    .commander-input {
      width: 100%;
      padding: 18px 22px;
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 700;
      background: var(--white);
      color: #000;
      border: var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.3s;
      box-shadow: 4px 4px 0px 0px #000;
      margin-bottom: 25px;
    }
    .commander-input:focus {
      border-color: var(--primary);
    }
    .commander-input::placeholder { color: #999; }
    .commander-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 8px;
      display: block;
    }
    .commander-launch-btn {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      padding: 16px 40px;
      border: var(--border);
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 5px 5px 0px 0px #000;
    }
    .commander-launch-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0px 0px #000;
    }
    .commander-launch-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0px 0px 0px 0px #000;
    }
    .commander-launch-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      background: #ccc;
      transform: none;
      box-shadow: 2px 2px 0px 0px #000;
    }
    .commander-back-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 8px 16px;
      background: var(--white);
      border: var(--border);
      color: #000;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 3px 3px 0px 0px #000;
      font-weight: 900;
    }
    .commander-back-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0px 0px #000;
    }
    .commander-back-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px 0px #000;
    }

    /* ===== WORKSPACE ===== */
    .workspace-view {
      animation: workspaceFadeIn 0.5s ease-out;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      z-index: 9998;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .workspace-main {
      width: 100%;
      padding: 20px 310px 80px 80px;
    }
    @media (min-width: 1400px) {
      .workspace-main {
        padding: 20px 340px 40px 110px;
      }
    }
    @media (min-width: 1600px) {
      .workspace-main {
        padding: 20px 350px 40px 130px;
      }
    }
    .workspace-top-bar {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 3px solid #000;
    }
    .workspace-top-bar h2 {
      font-family: var(--font-mono);
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 900;
      color: #000;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      word-break: break-word;
    }
    .workspace-top-bar .target-line {
      font-family: var(--font-mono);
      font-size: 12px;
      color: #555;
      margin-top: 6px;
      word-break: break-word;
    }
    .workspace-top-bar .target-line i {
      color: var(--primary);
      margin-right: 5px;
    }
    .severity-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .severity-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 3px solid #000;
      background: var(--white);
      color: #000;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.1s;
      box-shadow: 3px 3px 0px 0px #000;
    }
    .severity-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px 0px #000;
    }
    .severity-btn.active {
      background: #000;
      color: var(--bg);
      box-shadow: 0px 0px 0px 0px #000;
      transform: translate(2px, 2px);
    }

    /* ===== NOTES PANEL ===== */
    .notes-panel-fixed {
      position: fixed;
      right: 25px;
      top: 100px;
      bottom: 80px;
      width: 280px;
      background: var(--white);
      border: var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      z-index: 9999;
      overflow: hidden;
    }
    .notes-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 3px solid #000;
      background: var(--cream);
    }
    .notes-panel-header h4 {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #000;
      margin: 0;
    }
    .notes-mode-toggle {
      display: flex;
      gap: 4px;
    }
    .notes-mode-btn {
      padding: 4px 10px;
      font-size: 9px;
      font-weight: 900;
      font-family: var(--font-mono);
      border: 2px solid #000;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.1s;
      text-transform: uppercase;
    }
    .notes-mode-btn.active {
      background: #000;
      color: #fff;
    }
    .notes-mode-btn:not(.active) {
      background: var(--white);
      color: #000;
    }
    .notes-body {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .notes-textarea {
      width: 100%;
      flex: 1;
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--white);
      color: #000;
      border: none;
      padding: 14px;
      resize: none;
      outline: none;
      line-height: 1.6;
    }
    .notes-textarea::placeholder { color: #aaa; }
    .notes-preview {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      color: #000;
    }
    .notes-panel-footer {
      padding: 12px 16px;
      border-top: 3px solid #000;
      background: var(--cream);
    }
    .notes-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .notes-btn-reset {
      width: 100%;
      background: #dc2626;
      color: #fff;
      border: 3px solid #000;
      height: 34px;
      padding: 0 12px;
      border-radius: var(--radius);
      font-size: 10px;
      font-weight: 900;
      font-family: var(--font-mono);
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.1s;
      box-shadow: 3px 3px 0px 0px #000;
    }
    .notes-btn-reset:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px 0px #000;
    }
    .notes-progress {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .notes-pct-value {
      font-size: 1.6rem;
      font-weight: 900;
      color: #000;
      font-family: var(--font-mono);
    }
    .notes-pct-label {
      font-size: 9px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 900;
    }

    /* ===== PROGRESS SIDEBAR ===== */
    .progress-sidebar {
      position: fixed;
      left: 25px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .progress-label {
      font-size: 9px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      background: #000;
      border-radius: 6px;
      padding: 3px 10px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    }
    .progress-bar-track {
      width: 30px;
      height: 45vh;
      max-height: 400px;
      min-height: 150px;
      background: #e0e0e0;
      border-radius: 15px;
      border: 3px solid #000;
      position: relative;
      overflow: hidden;
      box-shadow: 4px 4px 0px 0px #000;
    }
    .progress-bar-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0%;
      transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 0 0 12px 12px;
    }
    .progress-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #000;
      border: 3px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      box-shadow: 3px 3px 0px 0px rgba(0,0,0,0.3);
    }
    .progress-circle span {
      font-size: 13px;
      font-weight: 900;
      color: #fff;
      font-family: var(--font-mono);
    }
    .progress-exit-btn {
      margin-top: 14px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 3px 3px 0px 0px #000;
      transition: all 0.1s;
      font-family: var(--font-mono);
      font-weight: 900;
      font-size: 22px;
      color: #fff;
      line-height: 1;
      text-decoration: none;
    }
    .progress-exit-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0px 0px 0px 0px #000;
    }
    .progress-exit-btn i {
      font-size: 18px;
      transform: rotate(180deg);
    }

    /* ===== NOTES MARKDOWN ===== */
    .notes-preview h1, .notes-preview h2, .notes-preview h3 {
      font-weight: 900;
      margin: 10px 0 6px 0;
      color: #000;
    }
    .notes-preview h1 { font-size: 16px; border-bottom: 2px solid #000; padding-bottom: 4px; }
    .notes-preview h2 { font-size: 14px; }
    .notes-preview h3 { font-size: 13px; }
    .notes-preview p { margin: 6px 0; }
    .notes-preview code {
      background: #e8e8e8;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      border: 1px solid #ccc;
    }
    .notes-preview pre {
      background: #1a1a2e;
      color: #5cd19c;
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      border: 2px solid #000;
      margin: 8px 0;
      font-size: 11px;
    }
    .notes-preview pre code {
      background: transparent;
      border: none;
      padding: 0;
      color: inherit;
    }
    .notes-preview strong { font-weight: 900; }
    .notes-preview em { font-style: italic; }
    .notes-preview ul, .notes-preview ol { padding-left: 20px; margin: 6px 0; }
    .notes-preview li { margin: 3px 0; }
    .notes-preview blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 12px;
      margin: 8px 0;
      color: #666;
      font-style: italic;
    }
    .notes-preview a { color: var(--primary); }
    .notes-preview hr { border: none; border-top: 2px solid #000; margin: 10px 0; }
    .notes-preview table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 11px; }
    .notes-preview th, .notes-preview td { border: 2px solid #000; padding: 5px 8px; text-align: left; }
    .notes-preview th { background: #e8e8e8; font-weight: 900; }
    .notes-preview input[type="checkbox"] { margin-right: 6px; accent-color: var(--primary); }

    /* ===== SCOPE SELECTOR ===== */
    .scope-selector-card {
      background: var(--white);
      border: var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 25px;
      margin: 30px auto;
      max-width: 900px;
      width: 90%;
    }
    .scope-select-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: var(--bg);
      animation: workspaceFadeIn 0.3s ease-out;
      padding: 40px;
      overflow-y: auto;
    }
    .scope-selector-card h2 {
      font-size: 1rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .scope-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .scope-card {
      background: var(--white);
      border: 3px solid #000;
      padding: 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 4px 4px 0px 0px #000;
    }
    .scope-card.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: none;
      transform: translate(3px, 3px);
    }
    .scope-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .scope-check {
      width: 20px;
      height: 20px;
      min-width: 20px;
      border: 2px solid #000;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .scope-card.active .scope-check {
      border-color: #fff;
      background: #000;
    }
    .scope-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .scope-action-btn {
      background: var(--primary);
      color: #fff;
      border: var(--border);
      padding: 6px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 900;
      font-size: 10px;
      text-transform: uppercase;
      font-family: var(--font-mono);
      transition: all 0.1s;
      box-shadow: 3px 3px 0px 0px #000;
    }
    .scope-action-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px 0px #000;
    }
    .scope-action-btn.dark {
      background: #000;
    }
    .scope-back-btn {
      background: transparent;
      border: 2px solid #000;
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      font-family: var(--font-mono);
      transition: all 0.1s;
      box-shadow: 3px 3px 0px 0px #000;
      margin-bottom: 16px;
      align-self: flex-start;
    }
    .scope-back-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0px 0px #000;
    }
    .scope-back-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px 0px #000;
    }
    .scope-continue-btn {
      margin-top: 20px;
      background: #000;
      color: #fff;
      border: 3px solid #000;
      padding: 14px 36px;
      font-family: var(--font-mono);
      font-weight: 900;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 5px 5px 0px 0px var(--primary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .scope-continue-btn:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0px 0px var(--primary);
    }
    .scope-continue-btn:active:not(:disabled) {
      transform: translate(3px, 3px);
      box-shadow: 0px 0px 0px 0px #000;
    }
    .scope-continue-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== RESPONSIVE: Large screens (1400px+) ===== */
    @media (min-width: 1400px) {
      .notes-panel-fixed {
        width: 290px;
        right: 25px;
      }
    }

    /* ===== RESPONSIVE: Medium screens (1100px - 1399px) ===== */
    @media (max-width: 1399px) {
      .workspace-main {
        padding: 20px 290px 40px 70px;
      }
      .notes-panel-fixed {
        width: 250px;
        right: 18px;
      }
    }

    /* ===== RESPONSIVE: Small laptops (900px - 1099px) ===== */
    @media (max-width: 1099px) {
      .workspace-main {
        padding: 20px 270px 40px 60px;
      }
      .notes-panel-fixed {
        width: 230px;
        right: 12px;
        top: 95px;
        bottom: 70px;
      }
      .progress-sidebar {
        left: 12px;
      }
      .teams-grid {
        gap: 25px;
      }
      .role-grid-2col {
        max-width: 340px;
      }
    }

    /* ===== RESPONSIVE: Tablets (700px - 899px) ===== */
    @media (max-width: 899px) {
      .workspace-main {
        padding: 20px 20px 40px 60px;
      }
      .notes-panel-fixed {
        position: relative;
        right: auto;
        top: auto;
        bottom: auto;
        width: 100%;
        max-width: 100%;
        margin-top: 25px;
        min-height: 300px;
      }
      .notes-body {
        min-height: 200px;
      }
      .progress-sidebar {
        left: 15px;
        top: auto;
        transform: none;
        position: fixed;
        bottom: 80px;
      }
      .progress-bar-track {
        height: 120px;
      }
      .role-select-card {
        padding: 20px;
      }
      .teams-grid {
        gap: 20px;
      }
      .role-grid-2col {
        max-width: 100%;
      }
      .role-node-btn.sub-red,
      .role-node-btn.sub-blue {
        padding: 10px 12px;
        font-size: 11px;
      }
    }

    /* ===== RESPONSIVE: Mobile (max 699px) ===== */
    @media (max-width: 699px) {
      .workspace-main {
        padding: 15px 15px 30px 15px;
        margin-bottom: 20px;
      }
      .notes-panel-fixed {
        position: relative;
        margin-top: 20px;
      }
      .progress-sidebar {
        position: relative;
        left: auto;
        bottom: auto;
        flex-direction: row;
        align-items: center;
        gap: 15px;
        justify-content: center;
        margin-bottom: 20px;
        padding: 12px;
        background: var(--white);
        border: var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        width: 100%;
        max-width: 100%;
      }
      .progress-label {
        margin-bottom: 0;
      }
      .progress-bar-track {
        width: 200px;
        height: 24px;
        max-height: none;
        min-height: auto;
        border-radius: 12px;
      }
      .progress-bar-fill {
        border-radius: 0 12px 12px 0;
      }
      .progress-circle {
        margin-top: 0;
        width: 36px;
        height: 36px;
      }
      .progress-circle span {
        font-size: 12px;
      }
      .progress-exit-btn {
        margin-top: 0;
        width: 36px;
        height: 36px;
        font-size: 18px;
      }
      .progress-exit-btn i {
        font-size: 15px;
      }
      .workspace-top-bar h2 {
        font-size: 1rem;
      }
      .role-select-card {
        padding: 15px;
      }
      .role-select-card .section-title {
        font-size: 0.9rem;
      }
      .teams-grid {
        grid-template-columns: 1fr;
        gap: 25px;
      }
      .role-node-btn.purple-btn {
        padding: 14px 24px;
        font-size: 13px;
      }
      .role-node-btn.red-team-btn,
      .role-node-btn.blue-team-btn {
        padding: 12px 20px;
        font-size: 12px;
      }
      .role-grid-2col {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .role-node-btn.sub-red,
      .role-node-btn.sub-blue {
        padding: 10px;
        font-size: 10px;
        gap: 5px;
      }
      .role-node-btn.sub-red i,
      .role-node-btn.sub-blue i {
        font-size: 12px;
      }
      .scope-grid {
        grid-template-columns: 1fr;
      }
      .saved-mission-banner {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 14px;
      }
      .saved-mission-info {
        width: 100%;
      }
      .saved-mission-resume {
        width: 100%;
        text-align: center;
      }
    }
  </style>
