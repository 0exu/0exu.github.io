<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0warn - Power Vault</title>
  <link rel="stylesheet" href="../home.css">
  <link rel="icon" sizes="70x70" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/OMSWASTRA_WITHOUT_BACKGORUND_2.png/250px-OMSWASTRA_WITHOUT_BACKGORUND_2.png" type="image/png">
  <link rel="apple-touch-icon" sizes="70x70" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/OMSWASTRA_WITHOUT_BACKGORUND_2.png/250px-OMSWASTRA_WITHOUT_BACKGORUND_2.png"> 
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./projects.css">
</head>
<body class="projects-body">
 
  <div class="content">
    <header>
      <h1 class="logo-text">
        <a href="../"><span>0</span><span>warn</span></a>
      </h1>
      <nav id="nav-menu">
        <a href="../"><i class="fas fa-home"></i> Home</a>
        <a href="../projects/" class="active"><i class="fas fa-code"></i> Projects</a>
        <a href="../news/"><i class="fas fa-newspaper"></i> News</a>
        <a href="../pvideo/"><i class="fas fa-video"></i> Vlog</a>
        <a href="../funthing/"><i class="fas fa-gamepad"></i> Fun</a>
      </nav>
      <div style="display: flex; gap: 15px; align-items: center;">
          <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
          <a href="../clock/" class="nav-clock-btn">
              <i class="fas fa-clock"></i>
              <span id="clock">00:00:00</span>
          </a>
      </div>
    </header>

    <div class="power-container">
      <!-- CONTROL CENTER -->
      <div class="terminal-controls">
        <div class="search-row">
          <div class="search-wrap">
            <i class="fas fa-terminal"></i>
            <input type="text" id="project-search" placeholder="Search resources... ( Press '/' to focus )" autocomplete="off">
          </div>
          <button class="gitlab-toggle-badge" id="gitlab-filter" title="View GitLab Profile">
            <i class="fab fa-gitlab"></i> GITLAB
          </button>
        </div>
        
        <div class="vault-meta">
          <span>NODES: <b id="node-count">0</b></span>
          <span>PORTFOLIO: <b>STABLE</b></span>
        </div>
      </div>

      <!-- DATA GRID -->
      <div class="power-grid" id="tools-grid"></div>
    </div>
    
    <footer>
      &copy; 2026 0warn | SECURING THE FUTUREcopy; 2026 0warn | SECURING THE FUTURE<p style="font-size: 0.7rem; opacity: 0.6; margin-top: 10px;">Disclaimer: This site is for educational and portfolio purposes only. No user data is collected or stored.</p>
    </footer>
  </div>
  
  <script src="../script.js"></script>
  <script src="./projects.js"></script>
</body>
</html>
